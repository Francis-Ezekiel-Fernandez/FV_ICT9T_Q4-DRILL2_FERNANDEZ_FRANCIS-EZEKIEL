<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"; rel="stylesheet">
<style>
input{
    margin: 5px;
}
</style>
</head>
<body>
    <center>
    <details class="ontoggle">

    <h2>Heat Index Checker</h2>
                <summary class="small text-info">Instructions</summary>
                <p class="text-info" id="Instructions"></p>
            </details>
</div>
    <h2>Celsius Temperature</h2>

    <input type="text" id="heatanswer" placeholder="Type the Temperature"><br><!--Type heat temperature-->

    <h2>Humidity Percentage</h2>

    <input type="text" id="humidity" placeholder="Type the Percentage"> <br><!--Type Humidity Percentage-->

    <button class="btn btn-info" onclick="indexcheck()">Check Heat Index</button>

    </form>
    </div>

    <script>

        document.getElementById('Instructions').innerHTML= "Type the Celsius Temperature and Humidity Percentage and figure out the Heat Index!";

    function indexcheck(){

    let heatanswer = document.getElementById("heatanswer").value
    let humidity = document.getElementById("humidity").value

    var x = heatanswer + (0.33 * humidity) - 4;

        message ="";

        switch(true){//boolean
            case ( x <= 27 ):
                message = ("The Heat Index is < or = 27, Comfortable/Cool");
                break;
            case ( x >= 28):
                message = ("The Heat Index is > or = 28, Warm");
                break;
            case ( x >= 33):
                message = ("The Heat Index is > or = 33, Hot");
                break;
            case ( x >= 38):
                message = ("The Heat Index is > or = 38, Very Hot/Caution");
                break;
            case ( x >= 42):
                message = ("The Heat Index is > or = 42, Extreme Heat/Danger");
                break;
            default:
                message = ("Please input valid values");
                break;
        }
        alert(message);
    }        
    </script>
    </center>
</body>
</html>
